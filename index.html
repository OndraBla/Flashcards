<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f4efe8">
  <title>Moje kartičky</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe7;
      --surface: #fffaf4;
      --surface-strong: #fff;
      --text: #251b12;
      --muted: #6d5845;
      --border: #dbc4ad;
      --shadow: 0 14px 34px rgba(74, 45, 17, 0.12);
      --primary: #b6642f;
      --primary-strong: #9a4f1f;
      --secondary: #efe2d2;
      --secondary-strong: #dfcfbc;
      --danger: #d55b4d;
      --danger-strong: #b84336;
      --accent: #235f52;
      --accent-strong: #18493f;
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), rgba(245, 239, 231, 0.8) 45%),
        linear-gradient(180deg, #f8f2eb 0%, var(--bg) 100%);
      color: var(--text);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: none;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, opacity 0.18s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .app-shell {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: max(20px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }

    .app-header {
      padding: 12px 4px 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 38rem;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .panel {
      background: rgba(255, 250, 244, 0.9);
      border: 1px solid rgba(219, 196, 173, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .panel + .panel {
      margin-top: 16px;
    }

    .flashcard-form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field span {
      font-weight: 700;
      font-size: 1rem;
    }

    textarea {
      width: 100%;
      resize: vertical;
      min-height: 112px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      padding: 14px 16px;
      color: var(--text);
    }

    textarea:focus,
    input:focus {
      outline: 2px solid rgba(182, 100, 47, 0.25);
      border-color: var(--primary);
    }

    .form-actions,
    .toolbar-panel {
      display: grid;
      gap: 12px;
    }

    .deck-panel {
      display: grid;
      gap: 12px;
    }

    .deck-controls {
      display: grid;
      gap: 10px;
    }

    .deck-select,
    .deck-input {
      width: 100%;
      min-height: 54px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
    }

    .deck-actions {
      display: grid;
      gap: 10px;
    }

    .primary-button,
    .secondary-button,
    .danger-button,
    .accent-button,
    .nav-button,
    .study-card {
      min-height: 54px;
    }

    .primary-button,
    .accent-button,
    .secondary-button,
    .danger-button,
    .import-button {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
    }

    .primary-button {
      background: var(--primary);
      color: #fff;
    }

    .primary-button:hover {
      background: var(--primary-strong);
    }

    .accent-button {
      background: var(--accent);
      color: #fff;
    }

    .accent-button:hover {
      background: var(--accent-strong);
    }

    .secondary-button,
    .import-button {
      background: var(--secondary);
      color: var(--text);
    }

    .secondary-button:hover,
    .import-button:hover {
      background: var(--secondary-strong);
    }

    .danger-button {
      background: var(--danger);
      color: #fff;
    }

    .danger-button:hover {
      background: var(--danger-strong);
    }

    .import-button {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .import-button input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .section-note {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .empty-state {
      margin: 0;
      padding: 14px 6px 4px;
      text-align: center;
      color: var(--muted);
    }

    .card-list {
      display: grid;
      gap: 12px;
    }

    .card-row {
      display: grid;
      gap: 14px;
      padding: 16px;
      border-radius: 20px;
      background: var(--surface-strong);
      border: 1px solid rgba(219, 196, 173, 0.85);
    }

    .card-preview {
      display: grid;
      gap: 10px;
    }

    .preview-block {
      display: grid;
      gap: 4px;
    }

    .preview-label {
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .preview-text {
      font-size: 1rem;
      line-height: 1.45;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .study-topbar {
      display: grid;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .study-progress {
      margin: 0;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
    }

    .study-score {
      margin: 0;
      text-align: center;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .study-stage {
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 12px;
      min-height: 68vh;
    }

    .nav-button {
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 2rem;
      color: var(--text);
    }

    .study-card {
      display: grid;
      align-content: center;
      gap: 16px;
      width: 100%;
      min-height: 62vh;
      padding: 24px 22px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 240, 228, 0.96));
      border: 1px solid rgba(219, 196, 173, 0.9);
      box-shadow: 0 22px 40px rgba(74, 45, 17, 0.16);
    }

    .study-side-label {
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .study-card-text {
      font-size: clamp(1.35rem, 5vw, 2rem);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .study-hint {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .study-swipe-hint {
      margin: 14px 0 0;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .study-feedback {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .know-button {
      background: var(--accent);
      color: #fff;
    }

    .know-button:hover {
      background: var(--accent-strong);
    }

    .dont-know-button {
      background: var(--danger);
      color: #fff;
    }

    .dont-know-button:hover {
      background: var(--danger-strong);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 700px) {
      .form-actions,
      .toolbar-panel,
      .study-topbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar-panel {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .study-topbar {
        grid-template-columns: auto 1fr;
      }

      .study-score {
        text-align: right;
      }

      .study-feedback {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .deck-controls,
      .deck-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card-row {
        grid-template-columns: 1fr auto;
        align-items: start;
      }

      .card-actions {
        grid-template-columns: repeat(2, minmax(130px, 160px));
      }
    }

    @media (max-width: 560px) {
      .study-stage {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .nav-button {
        min-height: 48px;
      }

      .study-card {
        order: -1;
        min-height: 56vh;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <p class="eyebrow">Flashcards pro iPhone</p>
      <h1>Moje kartičky</h1>
      <p class="subtitle">Vytvářej, upravuj a uč se pomocí jednoduchých kartiček i bez internetu.</p>
    </header>

    <main>
      <section id="editor-view" class="view active" aria-label="Zadávací režim">
        <div class="panel deck-panel">
          <div class="section-heading">
            <h2>Sady kartiček</h2>
            <p id="active-deck-note" class="section-note">Aktivní sada</p>
          </div>

          <div class="deck-controls">
            <select id="deck-select" class="deck-select" aria-label="Vyber sadu kartiček"></select>
            <input id="deck-name-input" class="deck-input" type="text" maxlength="80" placeholder="Název nové sady">
          </div>

          <div class="deck-actions">
            <button id="create-deck-button" class="secondary-button" type="button">Vytvořit sadu</button>
            <button id="delete-deck-button" class="danger-button" type="button">Smazat sadu</button>
          </div>
        </div>

        <div class="panel">
          <form id="flashcard-form" class="flashcard-form">
            <label class="field">
              <span>Přední strana</span>
              <textarea id="front-input" rows="4" maxlength="500" placeholder="Například otázka, pojem nebo slovo" required></textarea>
            </label>

            <label class="field">
              <span>Zadní strana</span>
              <textarea id="back-input" rows="5" maxlength="800" placeholder="Například odpověď, vysvětlení nebo překlad" required></textarea>
            </label>

            <div class="form-actions">
              <button id="save-card-button" class="primary-button" type="submit">Přidat kartičku</button>
              <button id="cancel-edit-button" class="secondary-button hidden" type="button">Zrušit úpravu</button>
            </div>
          </form>
        </div>

        <div class="panel toolbar-panel">
          <button id="study-button" class="accent-button" type="button">Učení</button>
          <button id="export-button" class="secondary-button" type="button">Export JSON</button>
          <label class="secondary-button import-button">
            Import JSON
            <input id="import-input" type="file" accept="application/json,.json">
          </label>
          <button id="clear-all-button" class="danger-button" type="button">Vymazat vše</button>
        </div>

        <section class="panel card-list-panel">
          <div class="section-heading">
            <h2>Uložené kartičky</h2>
            <p id="card-count" class="section-note">0 kartiček</p>
          </div>

          <p id="empty-state" class="empty-state">Zatím nemáte žádné kartičky.</p>
          <div id="card-list" class="card-list" aria-live="polite"></div>
        </section>
      </section>

      <section id="study-view" class="view" aria-label="Režim učení">
        <div class="study-topbar">
          <button id="back-to-edit-button" class="secondary-button" type="button">Zpět do editace</button>
          <div>
            <p id="study-progress" class="study-progress">Kartička 1 z 1</p>
            <p id="study-score" class="study-score">Umím: 0 | Neumím: 0</p>
          </div>
        </div>

        <div class="study-stage">
          <button id="prev-card-button" class="nav-button" type="button" aria-label="Předchozí kartička">‹</button>

          <button id="study-card" class="study-card" type="button" aria-live="polite">
            <span id="study-side-label" class="study-side-label">Přední strana</span>
            <span id="study-card-text" class="study-card-text"></span>
            <span class="study-hint">Klepni pro otočení</span>
          </button>

          <button id="next-card-button" class="nav-button" type="button" aria-label="Další kartička">›</button>
        </div>

        <div class="study-feedback">
          <button id="know-button" class="accent-button know-button" type="button">Umím</button>
          <button id="dont-know-button" class="danger-button dont-know-button" type="button">Neumím</button>
        </div>

        <p class="study-swipe-hint">Přejeď vlevo pro další kartičku, vpravo pro předchozí.</p>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "flashcardsAppState";

    const state = {
      decks: [],
      activeDeckId: null,
      editingId: null,
      currentIndex: 0,
      showingFront: true,
      knownCount: 0,
      unknownCount: 0,
      touchStartX: 0,
      touchEndX: 0
    };

    const elements = {
      editorView: document.getElementById("editor-view"),
      studyView: document.getElementById("study-view"),
      deckSelect: document.getElementById("deck-select"),
      deckNameInput: document.getElementById("deck-name-input"),
      createDeckButton: document.getElementById("create-deck-button"),
      deleteDeckButton: document.getElementById("delete-deck-button"),
      activeDeckNote: document.getElementById("active-deck-note"),
      flashcardForm: document.getElementById("flashcard-form"),
      frontInput: document.getElementById("front-input"),
      backInput: document.getElementById("back-input"),
      saveCardButton: document.getElementById("save-card-button"),
      cancelEditButton: document.getElementById("cancel-edit-button"),
      studyButton: document.getElementById("study-button"),
      exportButton: document.getElementById("export-button"),
      importInput: document.getElementById("import-input"),
      clearAllButton: document.getElementById("clear-all-button"),
      cardCount: document.getElementById("card-count"),
      emptyState: document.getElementById("empty-state"),
      cardList: document.getElementById("card-list"),
      backToEditButton: document.getElementById("back-to-edit-button"),
      studyProgress: document.getElementById("study-progress"),
      studyScore: document.getElementById("study-score"),
      studyCard: document.getElementById("study-card"),
      studySideLabel: document.getElementById("study-side-label"),
      studyCardText: document.getElementById("study-card-text"),
      prevCardButton: document.getElementById("prev-card-button"),
      nextCardButton: document.getElementById("next-card-button"),
      knowButton: document.getElementById("know-button"),
      dontKnowButton: document.getElementById("dont-know-button")
    };

    function createDeck(name = "Moje sada") {
      const randomId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      return {
        id: window.crypto && crypto.randomUUID ? crypto.randomUUID() : randomId,
        name,
        cards: []
      };
    }

    function getActiveDeck() {
      return state.decks.find((deck) => deck.id === state.activeDeckId) || null;
    }

    function getActiveCards() {
      const activeDeck = getActiveDeck();
      return activeDeck ? activeDeck.cards : [];
    }

    function loadCards() {
      const savedState = localStorage.getItem(STORAGE_KEY);

      if (!savedState) {
        const defaultDeck = createDeck("Výchozí sada");
        state.decks = [defaultDeck];
        state.activeDeckId = defaultDeck.id;
        return;
      }

      try {
        const parsedState = JSON.parse(savedState);
        const parsedDecks = Array.isArray(parsedState?.decks) ? parsedState.decks : [];

        state.decks = parsedDecks
          .filter((deck) => typeof deck?.name === "string" && Array.isArray(deck?.cards))
          .map((deck) => ({
            id: typeof deck.id === "string" && deck.id ? deck.id : createDeck(deck.name.trim() || "Moje sada").id,
            name: deck.name.trim() || "Moje sada",
            cards: deck.cards
              .filter((card) => typeof card?.front === "string" && typeof card?.back === "string")
              .map((card) => ({
                id: typeof card.id === "string" && card.id ? card.id : createCard(card.front.trim(), card.back.trim()).id,
                front: card.front.trim(),
                back: card.back.trim()
              }))
          }));

        if (state.decks.length === 0) {
          state.decks = [createDeck("Výchozí sada")];
        }

        const savedActiveDeckId = typeof parsedState?.activeDeckId === "string" ? parsedState.activeDeckId : null;
        state.activeDeckId = state.decks.some((deck) => deck.id === savedActiveDeckId)
          ? savedActiveDeckId
          : state.decks[0].id;
      } catch (error) {
        console.error("Nepodařilo se načíst data z localStorage:", error);
        const defaultDeck = createDeck("Výchozí sada");
        state.decks = [defaultDeck];
        state.activeDeckId = defaultDeck.id;
      }
    }

    function saveCards() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        decks: state.decks,
        activeDeckId: state.activeDeckId
      }));
    }

    function resetForm() {
      state.editingId = null;
      elements.flashcardForm.reset();
      elements.saveCardButton.textContent = "Přidat kartičku";
      elements.cancelEditButton.classList.add("hidden");
    }

    function renderDecks() {
      const currentActiveDeckId = state.activeDeckId;
      elements.deckSelect.innerHTML = "";

      state.decks.forEach((deck) => {
        const option = document.createElement("option");
        option.value = deck.id;
        option.textContent = `${deck.name} (${deck.cards.length})`;
        elements.deckSelect.appendChild(option);
      });

      elements.deckSelect.value = currentActiveDeckId;

      const activeDeck = getActiveDeck();
      elements.activeDeckNote.textContent = activeDeck ? `Aktivní: ${activeDeck.name}` : "Aktivní sada";
      elements.deleteDeckButton.disabled = state.decks.length <= 1;
    }

    function truncateText(text, maxLength = 90) {
      if (text.length <= maxLength) {
        return text;
      }

      return `${text.slice(0, maxLength).trim()}...`;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderCardList() {
      const activeCards = getActiveCards();
      elements.cardList.innerHTML = "";
      elements.cardCount.textContent = `${activeCards.length} ${activeCards.length === 1 ? "kartička" : activeCards.length >= 2 && activeCards.length <= 4 ? "kartičky" : "kartiček"}`;
      elements.emptyState.classList.toggle("hidden", activeCards.length > 0);

      activeCards.forEach((card) => {
        const row = document.createElement("article");
        row.className = "card-row";

        const preview = document.createElement("div");
        preview.className = "card-preview";

        const frontBlock = document.createElement("div");
        frontBlock.className = "preview-block";
        frontBlock.innerHTML = `
          <span class="preview-label">Přední strana</span>
          <p class="preview-text">${escapeHtml(truncateText(card.front))}</p>
        `;

        const backBlock = document.createElement("div");
        backBlock.className = "preview-block";
        backBlock.innerHTML = `
          <span class="preview-label">Zadní strana</span>
          <p class="preview-text">${escapeHtml(truncateText(card.back))}</p>
        `;

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const editButton = document.createElement("button");
        editButton.className = "secondary-button";
        editButton.type = "button";
        editButton.textContent = "Upravit";
        editButton.addEventListener("click", () => startEdit(card.id));

        const deleteButton = document.createElement("button");
        deleteButton.className = "danger-button";
        deleteButton.type = "button";
        deleteButton.textContent = "Smazat";
        deleteButton.addEventListener("click", () => deleteCard(card.id));

        actions.append(editButton, deleteButton);
        preview.append(frontBlock, backBlock);
        row.append(preview, actions);
        elements.cardList.appendChild(row);
      });
    }

    function startEdit(cardId) {
      const card = getActiveCards().find((item) => item.id === cardId);

      if (!card) {
        return;
      }

      state.editingId = cardId;
      elements.frontInput.value = card.front;
      elements.backInput.value = card.back;
      elements.saveCardButton.textContent = "Uložit změny";
      elements.cancelEditButton.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
      elements.frontInput.focus();
    }

    function deleteCard(cardId) {
      const activeDeck = getActiveDeck();

      if (!activeDeck) {
        return;
      }

      activeDeck.cards = activeDeck.cards.filter((card) => card.id !== cardId);
      saveCards();
      renderDecks();
      renderCardList();

      if (state.editingId === cardId) {
        resetForm();
      }
    }

    function handleFormSubmit(event) {
      event.preventDefault();

      const front = elements.frontInput.value.trim();
      const back = elements.backInput.value.trim();
      const activeDeck = getActiveDeck();

      if (!front || !back || !activeDeck) {
        return;
      }

      if (state.editingId) {
        const card = activeDeck.cards.find((item) => item.id === state.editingId);

        if (card) {
          card.front = front;
          card.back = back;
        }
      } else {
        activeDeck.cards.unshift({
          id: window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          front,
          back
        });
      }

      saveCards();
      renderDecks();
      renderCardList();
      resetForm();
    }

    function showView(viewName) {
      const showEditor = viewName === "editor";
      elements.editorView.classList.toggle("active", showEditor);
      elements.studyView.classList.toggle("active", !showEditor);
    }

    function updateStudyCard() {
      const activeCards = getActiveCards();
      const card = activeCards[state.currentIndex];

      if (!card) {
        return;
      }

      elements.studyProgress.textContent = `Kartička ${state.currentIndex + 1} z ${activeCards.length}`;
      elements.studyScore.textContent = `Umím: ${state.knownCount} | Neumím: ${state.unknownCount}`;
      elements.studySideLabel.textContent = state.showingFront ? "Přední strana" : "Zadní strana";
      elements.studyCardText.textContent = state.showingFront ? card.front : card.back;
      elements.prevCardButton.disabled = state.currentIndex === 0;
      elements.nextCardButton.disabled = state.currentIndex === activeCards.length - 1;
    }

    function startStudyMode() {
      if (getActiveCards().length === 0) {
        window.alert("Nejdřív přidej alespoň jednu kartičku.");
        return;
      }

      state.currentIndex = 0;
      state.showingFront = true;
      state.knownCount = 0;
      state.unknownCount = 0;
      updateStudyCard();
      showView("study");
    }

    function exitStudyMode() {
      showView("editor");
    }

    function flipStudyCard() {
      if (getActiveCards().length === 0) {
        return;
      }

      state.showingFront = !state.showingFront;
      updateStudyCard();
    }

    function goToCard(index) {
      const activeCards = getActiveCards();

      if (index < 0 || index >= activeCards.length) {
        return;
      }

      state.currentIndex = index;
      state.showingFront = true;
      updateStudyCard();
    }

    function showNextCard() {
      goToCard(state.currentIndex + 1);
    }

    function showPreviousCard() {
      goToCard(state.currentIndex - 1);
    }

    function markCardAsKnown(isKnown) {
      const activeDeck = getActiveDeck();

      if (!activeDeck || activeDeck.cards.length === 0) {
        return;
      }

      const currentCard = activeDeck.cards[state.currentIndex];

      if (!currentCard) {
        return;
      }

      if (isKnown) {
        state.knownCount += 1;
        showNextCard();
        return;
      }

      state.unknownCount += 1;

      // Kartičku, kterou ještě neumíš, přesuneme na konec fronty.
      const [cardToRepeat] = activeDeck.cards.splice(state.currentIndex, 1);
      activeDeck.cards.push(cardToRepeat);
      saveCards();

      if (state.currentIndex >= activeDeck.cards.length) {
        state.currentIndex = activeDeck.cards.length - 1;
      }

      state.showingFront = true;
      updateStudyCard();
    }

    function exportCards() {
      const activeDeck = getActiveDeck();

      if (!activeDeck) {
        return;
      }

      const payload = JSON.stringify(activeDeck.cards, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const dateStamp = new Date().toISOString().split("T")[0];

      link.href = url;
      link.download = `${activeDeck.name.replace(/[^\w\-]+/g, "-").toLowerCase() || "flashcards"}-${dateStamp}.json`;
      link.click();

      URL.revokeObjectURL(url);
    }

    function sanitizeImportedCards(rawCards) {
      if (!Array.isArray(rawCards)) {
        return [];
      }

      return rawCards
        .filter((card) => typeof card?.front === "string" && typeof card?.back === "string")
        .map((card) => ({
          id: typeof card.id === "string" && card.id ? card.id : createCard(card.front.trim(), card.back.trim()).id,
          front: card.front.trim(),
          back: card.back.trim()
        }))
        .filter((card) => card.front && card.back);
    }

    function getCardSignature(card) {
      return `${card.front.trim().toLowerCase()}::${card.back.trim().toLowerCase()}`;
    }

    function importCards(event) {
      const file = event.target.files?.[0];

      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          const importedCards = sanitizeImportedCards(parsed);

          if (importedCards.length === 0) {
            window.alert("V tomto JSONu nejsou žádné použitelné kartičky.");
            return;
          }

          const activeDeck = getActiveDeck();

          if (!activeDeck) {
            return;
          }

          const existingSignatures = new Set(activeDeck.cards.map((card) => getCardSignature(card)));
          let skippedDuplicates = 0;
          const uniqueImportedCards = importedCards.filter((card) => {
            const signature = getCardSignature(card);

            if (existingSignatures.has(signature)) {
              skippedDuplicates += 1;
              return false;
            }

            existingSignatures.add(signature);
            return true;
          });

          if (uniqueImportedCards.length === 0) {
            window.alert("Nic nového se neimportovalo. Všechny kartičky už máš uložené.");
            return;
          }

          activeDeck.cards = [...uniqueImportedCards, ...activeDeck.cards];
          saveCards();
          renderDecks();
          renderCardList();
          resetForm();
          window.alert(`Import hotový.\nPřidáno: ${uniqueImportedCards.length}\nPřeskočeno: ${skippedDuplicates}`);
        } catch (error) {
          console.error("Chyba při importu JSON:", error);
          window.alert("Soubor se nepodařilo načíst. Zkontroluj, že je to platný JSON.");
        } finally {
          event.target.value = "";
        }
      };

      reader.readAsText(file, "utf-8");
    }

    function clearAllCards() {
      const activeDeck = getActiveDeck();

      if (!activeDeck || activeDeck.cards.length === 0) {
        return;
      }

      const confirmed = window.confirm("Opravdu chcete vymazat všechny kartičky v této sadě?");

      if (!confirmed) {
        return;
      }

      activeDeck.cards = [];
      saveCards();
      renderDecks();
      renderCardList();
      resetForm();
      exitStudyMode();
    }

    function createNewDeck() {
      const deckName = elements.deckNameInput.value.trim();

      if (!deckName) {
        window.alert("Zadej název nové sady.");
        return;
      }

      const duplicateDeck = state.decks.some((deck) => deck.name.trim().toLowerCase() === deckName.toLowerCase());

      if (duplicateDeck) {
        window.alert("Sada s tímto názvem už existuje.");
        return;
      }

      const newDeck = createDeck(deckName);
      state.decks.unshift(newDeck);
      state.activeDeckId = newDeck.id;
      elements.deckNameInput.value = "";
      resetForm();
      saveCards();
      renderDecks();
      renderCardList();
    }

    function changeActiveDeck() {
      state.activeDeckId = elements.deckSelect.value;
      state.currentIndex = 0;
      state.showingFront = true;
      state.knownCount = 0;
      state.unknownCount = 0;
      resetForm();
      saveCards();
      renderDecks();
      renderCardList();
      showView("editor");
    }

    function deleteActiveDeck() {
      const activeDeck = getActiveDeck();

      if (!activeDeck || state.decks.length <= 1) {
        return;
      }

      const confirmed = window.confirm(`Opravdu chcete smazat sadu "${activeDeck.name}"?`);

      if (!confirmed) {
        return;
      }

      state.decks = state.decks.filter((deck) => deck.id !== activeDeck.id);
      state.activeDeckId = state.decks[0].id;
      state.currentIndex = 0;
      state.knownCount = 0;
      state.unknownCount = 0;
      resetForm();
      saveCards();
      renderDecks();
      renderCardList();
      showView("editor");
    }

    function handleTouchStart(event) {
      state.touchStartX = event.changedTouches[0].clientX;
    }

    function handleTouchEnd(event) {
      state.touchEndX = event.changedTouches[0].clientX;
      const deltaX = state.touchEndX - state.touchStartX;
      const minimumSwipeDistance = 45;

      if (Math.abs(deltaX) < minimumSwipeDistance) {
        return;
      }

      if (deltaX < 0) {
        showNextCard();
      } else {
        showPreviousCard();
      }
    }

    function bindEvents() {
      elements.flashcardForm.addEventListener("submit", handleFormSubmit);
      elements.deckSelect.addEventListener("change", changeActiveDeck);
      elements.createDeckButton.addEventListener("click", createNewDeck);
      elements.deleteDeckButton.addEventListener("click", deleteActiveDeck);
      elements.cancelEditButton.addEventListener("click", resetForm);
      elements.studyButton.addEventListener("click", startStudyMode);
      elements.backToEditButton.addEventListener("click", exitStudyMode);
      elements.studyCard.addEventListener("click", flipStudyCard);
      elements.prevCardButton.addEventListener("click", showPreviousCard);
      elements.nextCardButton.addEventListener("click", showNextCard);
      elements.knowButton.addEventListener("click", () => markCardAsKnown(true));
      elements.dontKnowButton.addEventListener("click", () => markCardAsKnown(false));
      elements.exportButton.addEventListener("click", exportCards);
      elements.importInput.addEventListener("change", importCards);
      elements.clearAllButton.addEventListener("click", clearAllCards);

      // Swipe vlevo/vpravo pro pohyb mezi kartičkami na dotykové obrazovce.
      elements.studyCard.addEventListener("touchstart", handleTouchStart, { passive: true });
      elements.studyCard.addEventListener("touchend", handleTouchEnd, { passive: true });
    }

    function init() {
      loadCards();
      renderDecks();
      renderCardList();
      bindEvents();
    }

    init();
  </script>
</body>
